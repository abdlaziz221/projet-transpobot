services:
  # Backend FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transpobot_backend
    restart: always
    env_file: .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - transpobot_network

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend_nextjs
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: transpobot_frontend
    restart: always
    depends_on:
      - backend
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend_nextjs:/app
      - /app/node_modules
      - /app/.next
    networks:
      - transpobot_network

networks:
  transpobot_network:
    driver: bridge
