services:
  # Base de données MySQL
  db:
    image: mysql:8.0
    container_name: transpobot_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - transpobot_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  # Backend FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transpobot_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - transpobot_network

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend_nextjs
      dockerfile: Dockerfile
    container_name: transpobot_frontend
    restart: always
    depends_on:
      - backend
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend_nextjs:/app
      - /app/node_modules
      - /app/.next
    networks:
      - transpobot_network

volumes:
  db_data:

networks:
  transpobot_network:
    driver: bridge
